<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Congratulations</title>

<style>

*{
  box-sizing:border-box;
}

body{

  margin:0;

  overflow:hidden;

  min-height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  padding:24px;

  font-family:
    "Hiragino Sans",
    "Yu Gothic",
    sans-serif;

  background:
    linear-gradient(
      135deg,
      #ffe6f4,
      #fff7b0,
      #b9f4ff
    );

}



/* 紙吹雪 */

canvas{

  position:fixed;

  inset:0;

  pointer-events:none;

}



/* 中央 */

.center{

  position:relative;

  z-index:10;

  width:100%;

  max-width:640px;

  text-align:center;

}



/* Congratulations */

.title{

  display:flex;

  justify-content:center;

  align-items:center;

  gap:10px;

  flex-wrap:nowrap;

  white-space:nowrap;

  font-size:
    clamp(22px,6vw,42px);

  line-height:1;

  font-weight:800;

  color:#ff4f8b;

  animation:
    pop .8s ease;

}

  .title span{

  font-size:.9em;

  flex-shrink:0;

}


/* メッセージ */

.message{

  margin-top:42px;

  font-size:
    clamp(15px,4vw,22px);

  line-height:1.9;

  color:#555;

  opacity:0;

}



.message.show{

  animation:
    fadeMessage 1.5s forwards;

}



/* ありがとう */

.thanks{

  font-weight:600;

  font-size:1.08em;

  color:#e96a92;

}



/* animation */

@keyframes pop{

  0%{

    opacity:0;

    transform:
      scale(.4);

  }

  70%{

    transform:
      scale(1.1);

  }

  100%{

    opacity:1;

    transform:
      scale(1);

  }

}



@keyframes fadeMessage{

  from{

    opacity:0;

    transform:
      translateY(20px);

  }

  to{

    opacity:1;

    transform:
      translateY(0);

  }

}

</style>
</head>

<body>



<canvas id="canvas"></canvas>



<div class="center">


<div class="title">

  <span>🎉</span>

  Congratulations!

  <span>🎉</span>

</div>



  <div
    class="message"
    id="message"
  >

    今日は私たちの結婚式に来てくれて、<br>

    <span class="thanks">
      本当にありがとう！
    </span>

    <br><br>

    我々にとって縁の深いみなさまの笑顔に囲まれて<br>
    今日という特別な日を迎えられたこと<br>
    心から幸福と感じています<br><br>

    まだまだ未熟なふたりですが<br>
    今日ここで交わした誓いを一生のあかしとして<br>
    手を取り合って歩んでいきます<br><br>
    
    これからも、どうぞよしなに<br>
    末永くよろしくお願いします

    Ryo & Nanase
  </div>


</div>



<script>



const canvas =
  document
    .getElementById(
      "canvas"
    );



const ctx =
  canvas.getContext(
    "2d"
  );



function resize(){

  canvas.width =
    innerWidth;


  canvas.height =
    innerHeight;

}



resize();



addEventListener(

  "resize",

  resize

);




const colors = [

  "#f4a7b9",

  "#9fcaf7",

  "#f6dd8b",

  "#9fd9b0",

  "#c8b2f2"

];



const pieces = [];



for(
  let i=0;
  i<120;
  i++
){


  pieces.push({


    x:
      Math.random()
      * canvas.width,


    y:
      -50
      - Math.random()
      * canvas.height,


    size:
      6
      + Math.random()*8,


    speed:
      2
      + Math.random()*4,


    drift:
      -2
      + Math.random()*4,


    rotate:
      Math.random()
      * 360,


    color:
      colors[
        Math.floor(
          Math.random()
          * colors.length
        )
      ]


  });


}




let running =
  true;




function animate(){


  if(
    !running
  ){
    return;
  }



  ctx.clearRect(

    0,
    0,

    canvas.width,
    canvas.height

  );



  pieces.forEach(p=>{


    p.y +=
      p.speed;



    p.x +=
      p.drift;



    p.rotate +=
      4;



    ctx.save();



    ctx.translate(

      p.x,

      p.y

    );



    ctx.rotate(

      p.rotate
      *
      Math.PI
      /180

    );



    ctx.fillStyle =
      p.color;



    ctx.fillRect(

      0,

      0,

      p.size,

      p.size

    );



    ctx.restore();


  });



  requestAnimationFrame(
    animate
  );


}




animate();




/* 2秒で紙吹雪終了 */

setTimeout(()=>{


  running =
    false;



  ctx.clearRect(

    0,
    0,

    canvas.width,
    canvas.height

  );


},2000);




/* メッセージ表示 */

setTimeout(()=>{


  document
    .getElementById(
      "message"
    )
    .classList
    .add(
      "show"
    );


},2200);



</script>

</body>
</html>
