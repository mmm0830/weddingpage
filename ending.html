<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank you</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">

<style>
*{ box-sizing:border-box; margin:0; padding:0; }

:root{
  --sage:      #a8bfae;
  --blue-gray: #8fa8bf;
  --gold:      #c9a96e;
  --text:      #4a5568;
  --text-light:#7a8fa0;
}

body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:48px 24px;
  font-family:'Noto Serif JP', serif;
  background:
    radial-gradient(ellipse at 50% 110%, #f5e0a0 0%, #e8c878 20%, transparent 55%),
    radial-gradient(ellipse at 20% 60%,  #d0e8f5 0%, transparent 50%),
    radial-gradient(ellipse at 80% 40%,  #b8d8f0 0%, transparent 50%),
    radial-gradient(ellipse at 50% 0%,   #e8f4ff 0%, transparent 60%),
    linear-gradient(180deg, #c8e8f8 0%, #d8eefc 40%, #e8d8a0 100%);
  overflow-x:hidden;
}

canvas{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
}

.center{
  position:relative;
  z-index:10;
  width:100%;
  max-width:480px;
  text-align:center;
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(12px);
  border-radius:24px;
  padding:40px 32px;
  box-shadow:
    0 2px 0 rgba(201,169,110,.3),
    0 20px 60px rgba(100,130,160,.12),
    inset 0 1px 0 rgba(255,255,255,.9);
  border:1px solid rgba(201,169,110,.2);
}

/* タイトル */
.title-wrap{
  margin-bottom:40px;
  animation: bloom .9s cubic-bezier(.2,.8,.3,1.1) both;
}

@keyframes bloom{
  0%{   opacity:0; transform:scale(.7) translateY(10px); filter:blur(6px); }
  60%{  opacity:1; transform:scale(1.03); filter:blur(0); }
  100%{ opacity:1; transform:scale(1); }
}

.title-deco{
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-weight:300;
  font-size:12px;
  letter-spacing:.3em;
  color:var(--gold);
  margin-bottom:8px;
}
.title-deco::before{ content:'— '; }
.title-deco::after{  content:' —'; }

.title{
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-weight:300;
  font-size:clamp(42px,11vw,64px);
  letter-spacing:.06em;
  color:var(--text);
  line-height:1.1;
}

.title-sub{
  margin-top:8px;
  font-size:12px;
  letter-spacing:.2em;
  color:var(--text-light);
}

/* 区切り */
.ornament{
  margin:0 auto 36px;
  display:flex;
  align-items:center;
  gap:12px;
  width:fit-content;
  opacity:0;
  animation: fadeUp .8s .6s forwards;
}

.ornament-line{
  width:40px;
  height:1px;
  background:linear-gradient(90deg, transparent, var(--gold));
}
.ornament-line:last-child{
  background:linear-gradient(90deg, var(--gold), transparent);
}

.ornament-icon{
  font-size:14px;
  color:var(--gold);
  font-family:'Cormorant Garamond', serif;
}

/* メッセージ */
.message{
  font-size:clamp(13px,3.5vw,16px);
  line-height:2.1;
  color:#3a4558;
  font-weight:300;
  opacity:0;
  animation: fadeUp 1.2s .9s forwards;
}

@keyframes fadeUp{
  from{ opacity:0; transform:translateY(16px); }
  to{   opacity:1; transform:translateY(0); }
}

.thanks{
  font-weight:400;
  color:#9a5070;
}

.redWord{    color:#c04040; font-weight:400; }
.blueWord{   color:#4070b0; font-weight:400; }
.yellowWord{ color:#907020; font-weight:400; }
.greenWord{  color:#408050; font-weight:400; }
.purpleWord{ color:#5040a0; font-weight:400; }

/* 署名 */
.signature{
  margin-top:32px;
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-size:18px;
  letter-spacing:.12em;
  color:var(--text-light);
  opacity:0;
  animation: fadeUp .8s 1.8s forwards;
}
</style>

</head>
<body>

<canvas id="canvas"></canvas>

<div class="center">

  <div class="title-wrap">
    <div class="title-deco">With gratitude</div>
    <div class="title">Thank you</div>
  </div>

  <div class="ornament">
    <div class="ornament-line"></div>
    <div class="ornament-icon">✦</div>
    <div class="ornament-line"></div>
  </div>

  <div class="message">
    今日は私たちの結婚式にお越しいただき<br>
    <span class="thanks">本当にありがとうございます</span>
    <br><br>
    我々にとって縁の深いみなさまの<br>
    <span class="redWord">笑顔</span>に囲まれて<br>
    今日という<span class="blueWord">特別</span>な日を迎えられたこと<br>
    心から<span class="yellowWord">幸福</span>に感じています<br><br>
    まだまだ未熟な<span class="greenWord">ふたり</span>ですが<br>
    今日ここで交わした誓いを<br>
    一生の<span class="purpleWord">証</span>として<br>
    手を取り合って歩んでいきます<br><br>
    これからも、どうぞよしなに<br>
    末永くよろしくお願いします
  </div>

  <div class="signature">Ryo &amp; Nanase</div>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx    = canvas.getContext("2d");

function resize(){
  canvas.width  = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

const colors = [
  "rgba(255,255,255,.95)",
  "rgba(220,235,255,.9)",
  "rgba(160,200,240,.85)",
  "rgba(200,220,255,.9)",
  "rgba(240,248,255,.95)"
];

const pieces = Array.from({length:120}, ()=>({
  x:       Math.random() * canvas.width,
  y:       -30 - Math.random() * canvas.height,
  w:       4  + Math.random() * 8,
  h:       6  + Math.random() * 10,
  speed:   1.2 + Math.random() * 2.5,
  drift:   -1 + Math.random() * 2,
  rotate:  Math.random() * 360,
  spin:    1  + Math.random() * 3,
  opacity: .7 + Math.random() * .3,
  color:   colors[Math.floor(Math.random() * colors.length)]
}));

let running = true;

function animate(){
  if(!running) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  pieces.forEach(p=>{
    p.y       += p.speed;
    p.x       += p.drift;
    p.rotate  += p.spin;
    ctx.save();
    ctx.globalAlpha = p.opacity;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotate * Math.PI / 180);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, p.w/2, p.h/2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
  requestAnimationFrame(animate);
}

animate();

setTimeout(()=>{
  running = false;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}, 5000);
</script>

</body>
</html>
