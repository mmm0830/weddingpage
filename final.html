<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>最後の問題</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;

  min-height:100vh;

  display:flex;
  flex-direction:column;

  justify-content:center;
  align-items:center;

  padding:20px;

  font-family:
    "Hiragino Sans",
    "Yu Gothic",
    sans-serif;

  background:
    linear-gradient(
      135deg,
      #ffe6f4,
      #fff7b0,
      #b9f4ff
    );
}

.title{

  margin-bottom:26px;

  font-size:28px;

  font-weight:bold;

  color:#ff4f8b;

}

.container{

  width:100%;

  max-width:380px;

  display:grid;

  grid-template-columns:
    repeat(5,1fr);

  gap:8px;

}


/* 枠 */

.box{

  position:relative;

  aspect-ratio:1/1;

  border-radius:18px;

  border:4px solid;

  background:white;

  box-shadow:
    0 8px 16px
    rgba(0,0,0,.08);

}


/* 入力文字 */

.box input{

  width:100%;

  height:100%;

  border:none;

  background:transparent;

  text-align:center;

  font-size:28px;

  font-weight:bold;

  outline:none;

}


/* 左上数字 */

.number{

  position:absolute;

  top:6px;

  left:8px;

  font-size:13px;

  font-weight:bold;

  background:white;

  border-radius:6px;

  padding:1px 3px;

}



/* 色 */

.red{
  border-color:#ff6b6b;
}
.red .number{
  color:#ff6b6b;
}


.blue{
  border-color:#4dabf7;
}
.blue .number{
  color:#4dabf7;
}


.yellow{
  border-color:#f7b801;
}
.yellow .number{
  color:#f7b801;
}


.green{
  border-color:#51cf66;
}
.green .number{
  color:#51cf66;
}


.purple{
  border-color:#b197fc;
}
.purple .number{
  color:#b197fc;
}



/* ヒント */

.hintButton{

  margin-top:22px;

  font-size:13px;

  color:#4dabf7;

  text-decoration:underline;

  font-weight:bold;

}

.hint{

  margin-top:8px;

  min-height:22px;

  font-size:13px;

  font-weight:bold;

  color:#ff4f8b;

}



/* ボタン */

#answerBtn{

  margin-top:34px;

  border:none;

  border-radius:999px;

  padding:16px 50px;

  font-size:18px;

  font-weight:bold;

  color:white;

  background:
    linear-gradient(
      90deg,
      #ff4f8b,
      #ff8f3c
    );

  box-shadow:
    0 10px 20px
    rgba(0,0,0,.12);

}



#message{

  margin-top:16px;

  min-height:24px;

  color:#ff4f8b;

  font-weight:bold;

}

</style>
</head>

<body>



<div class="title">
  最後の問題
</div>



<div class="container">


  <div class="box red">
    <div class="number">1</div>
    <input id="a1" maxlength="1">
  </div>


  <div class="box blue">
    <div class="number">3</div>
    <input id="a2" maxlength="1">
  </div>


  <div class="box yellow">
    <div class="number">2</div>
    <input id="a3" maxlength="1">
  </div>


  <div class="box green">
    <div class="number">1</div>
    <input id="a4" maxlength="1">
  </div>


  <div class="box purple">
    <div class="number">2</div>
    <input id="a5" maxlength="1">
  </div>


</div>



<div
  class="hintButton"
  onclick="showHint()"
>
  -ヒントを見る-
</div>


<div
  class="hint"
  id="hint"
></div>



<button
  id="answerBtn"
  onclick="checkFinal()"
>
  こたえを送信
</button>



<div id="message"></div>



<script>



const correct = [

  "あ",

  "り",

  "が",

  "と",

  "う"

];



function hira(str){

  return str
    .trim()
    .replace(
      /[ァ-ン]/g,
      s =>
      String
        .fromCharCode(
          s.charCodeAt(0)-0x60
        )
    );

}



function showHint(){

  document
    .getElementById(
      "hint"
    )
    .innerHTML =
    "問題の色と答えの数字に注目";

}



const ids = [

  "a1",

  "a2",

  "a3",

  "a4",

  "a5"

];



ids.forEach((id,i)=>{


  const box =
    document
      .getElementById(
        id
      );


  let composing =
    false;



  box.addEventListener(
    "compositionstart",
    ()=>{
      composing = true;
    }
  );



  box.addEventListener(
    "compositionend",
    ()=>{
      composing = false;
      moveNext();
    }
  );



  box.addEventListener(
    "input",
    ()=>{

      if(
        !composing
      ){
        moveNext();
      }

    }
  );



  function moveNext(){


    if(

      box.value.length > 0

      &&

      i < ids.length-1

    ){


      setTimeout(()=>{

        document
          .getElementById(
            ids[i+1]
          )
          .focus();

      },80);


    }


  }


});



function checkFinal(){


  const input =

    ids.map(
      id =>

      hira(

        document
          .getElementById(
            id
          )
          .value

      )
    );



  if(

    JSON.stringify(
      input
    )

    ===

    JSON.stringify(
      correct
    )

  ){

    location.href =
      "ending.html";

  }else{

    document
      .getElementById(
        "message"
      )
      .innerHTML =
      "ちがうみたい…";

  }


}


</script>

</body>
</html>
