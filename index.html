<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>なぞとき</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ff9ad5,#ffd36e,#8fe8ff);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.wrapper{
  width:100%;
  max-width:420px;
  background:white;
  border-radius:30px;
  padding:25px;
  text-align:center;
}

h1{
  color:#ff4f8b;
}

.wordBox{
  margin-bottom:15px;
}

.wordBox input{
  width:100%;
  padding:14px;
  font-size:18px;
  border-radius:15px;
  border:2px solid #eee;
  text-align:center;
}

.label{
  margin-bottom:5px;
  font-weight:bold;
}

.hint{
  margin-top:6px;
  min-height:30px;
  font-size:12px;
  color:#ff4f8b;
}

button{
  width:100%;
  margin-top:20px;
  border:none;
  border-radius:999px;
  padding:16px;
  font-size:18px;
  font-weight:bold;
  color:white;
  background:linear-gradient(90deg,#ff4f8b,#ff8f3c);
}

#finalButton{
  display:none;
  margin-top:20px;
}

#clearScreen{
  position:fixed;
  inset:0;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  opacity:0;
  pointer-events:none;
}

#clearScreen.show{
  opacity:1;
}

.mainText{
  font-size:42px;
  font-weight:bold;
  color:#ff4f8b;
}
</style>
</head>

<body>

<div class="wrapper">

<h1>なぞときチャレンジ！</h1>

<div class="wordBox">
<div class="label">①</div>
<input id="c1">
<div class="hint" id="h1"></div>
</div>

<div class="wordBox">
<div class="label">②</div>
<input id="c2">
<div class="hint" id="h2"></div>
</div>

<div class="wordBox">
<div class="label">③</div>
<input id="c3">
<div class="hint" id="h3"></div>
</div>

<div class="wordBox">
<div class="label">④</div>
<input id="c4">
<div class="hint" id="h4"></div>
</div>

<div class="wordBox">
<div class="label">⑤</div>
<input id="c5">
<div class="hint" id="h5"></div>
</div>

<button onclick="check()">
こたえる！
</button>

<button id="finalButton" onclick="goFinal()">
最後の問題へ
</button>

</div>


<div id="clearScreen">
  <div class="mainText">
    🎉 Congratulations! 🎉
  </div>
</div>


<script>

const correct = [
  "えがお",
  "とくべつ",
  "こうふく",
  "ふたり",
  "あかし"
];

const hints = [
  "① 右から時計回り",
  "② 矢印の通り道",
  "③ 7×7、8×8、4×8",
  "④ 上下左右に注目",
  "⑤ もう一回"
];

function hira(str){
  return str.trim().replace(/[ァ-ン]/g,s =>
    String.fromCharCode(s.charCodeAt(0)-0x60)
  );
}

function check(){

  let score = 0;

  for(let i=1;i<=5;i++){
    document.getElementById("h"+i).innerHTML="";
  }

  const input = [
    hira(c1.value),
    hira(c2.value),
    hira(c3.value),
    hira(c4.value),
    hira(c5.value)
  ];

  for(let i=0;i<5;i++){

    if(input[i]===correct[i]){
      score++;
    }else{
      document.getElementById("h"+(i+1)).innerHTML =
      hints[i];
    }

  }

  if(score===5){
    showCongratulations();
  }

}

function showCongratulations(){

  document.getElementById("clearScreen")
  .classList.add("show");

  setTimeout(()=>{
    document.getElementById("finalButton")
    .style.display="block";
  },2500);

}

function goFinal(){
  location.href="final.html";
}

</script>

</body>
</html>
