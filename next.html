<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#fff8fc;
  font-family:sans-serif;
}

.container{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  width:90%;
  max-width:420px;
}

.box{
  position:relative;
  aspect-ratio:1/1;
  border-radius:20px;
  border:4px solid;
  background:white;
}

.box input{
  width:100%;
  height:100%;
  border:none;
  text-align:center;
  font-size:34px;
}

.number{
  position:absolute;
  top:8px;
  left:10px;
  font-weight:bold;
}

.red{border-color:#ff6b6b;}
.blue{border-color:#4dabf7;}
.yellow{border-color:#ffd43b;}
.green{border-color:#51cf66;}
.purple{border-color:#b197fc;}

button{
  margin-top:40px;
  border:none;
  border-radius:999px;
  padding:16px 50px;
  font-size:20px;
  color:white;
  background:linear-gradient(90deg,#ff4f8b,#ff8f3c);
}
</style>
</head>

<body>

<div class="container">

<div class="box red">
<div class="number">1</div>
<input id="a1" maxlength="1">
</div>

<div class="box blue">
<div class="number">3</div>
<input id="a2" maxlength="1">
</div>

<div class="box yellow">
<div class="number">2</div>
<input id="a3" maxlength="1">
</div>

<div class="box green">
<div class="number">1</div>
<input id="a4" maxlength="1">
</div>

<div class="box purple">
<div class="number">2</div>
<input id="a5" maxlength="1">
</div>

</div>

<button onclick="checkFinal()">
答える！
</button>

<script>

const correct = [
  "あ",
  "り",
  "が",
  "と",
  "う"
];

function hira(str){
  return str.trim().replace(/[ァ-ン]/g,s =>
    String.fromCharCode(s.charCodeAt(0)-0x60)
  );
}

function checkFinal(){

  const input = [
    hira(a1.value),
    hira(a2.value),
    hira(a3.value),
    hira(a4.value),
    hira(a5.value)
  ];

  if(JSON.stringify(input)
  === JSON.stringify(correct)){

    location.href="ending.html";

  }

}

</script>

</body>
</html>
